name: Changelog

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to generate changelog for (e.g., v0.2.0)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  # ==================================================================================== #
  # UPDATE CHANGELOG (direct commit to main)
  # ==================================================================================== #
  update-changelog:
    name: Update Changelog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        with:
          config: pyproject.toml
          args: --verbose
        env:
          OUTPUT: docs/changelog.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Commit and push changelog
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          if git diff --quiet docs/changelog.md; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          git checkout main
          git add docs/changelog.md
          git commit -m "docs: regenerate changelog for ${TAG}"
          git push origin main
